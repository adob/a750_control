syntax = "proto3";

import "serialrpc.proto";

package a750;

message Joint {
    float pos_rad       = 1;
    float vel_rads     = 2;
    float torque_nm     = 3;
    int32 temp_mosfet_c = 4;
    int32 temp_rotor_c  = 5;
}

message RobotState {
    enum Mode {
        Startup = 0;
        Enabled = 1;
        Stopped = 2;
        Fault  = 3;
    }

    Mode mode = 1;

    Joint joint1 = 2;
    Joint joint2 = 3;
    Joint joint3 = 4;
    Joint joint4 = 5;
    Joint joint5 = 6;
    Joint joint6 = 7;

    Joint gripper = 8;
}

message JointCommand {
    float pos_setpoint_rad = 1;
    float pos_gain_nmrad = 2;

    float vel_setpoint_rads = 3;
    float vel_gain_nms_rad = 4;

    float acc_radss = 6;

    float torque_nm = 5;
}

message CommandJointsRequest {
    JointCommand joint1 = 1;
    JointCommand joint2 = 2;
    JointCommand joint3 = 3;
    JointCommand joint4 = 4;
    JointCommand joint5 = 5;
    JointCommand joint6 = 6;
    
    JointCommand gripper = 7;
}

service RobotService {
    option (uuid) = "3f540d57-8294-472e-bc2e-2d77dd11e186";
    
    rpc read_state(void) returns (RobotState) { option (method_id) = 1; }
    rpc start_realtime_control(void) returns (RobotState) { option (method_id) = 1; }
    rpc stop_realtime_control(void) returns (void) { option (method_id) = 2; }
    rpc command_joints(CommandJointsRequest) returns (RobotState) { option (method_id) = 1; }
}
