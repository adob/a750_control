syntax = "proto3";

import "serialrpc.proto";

package serialrpc;

message EchoRequest {
    int32 n = 1;
}

message EchoResponse {
    int32 n = 1;
}

message SleepRequest {
    uint32 duration_ms = 1;
}

message WriteRequest {
    uint64 address = 1;
    bytes data = 2 [(bytes_size) = 512];
    bytes disk = 3 [(bytes_size) = 64];  // optional disk name, e.g. "sdcard"
}

message ReadRequest {
    uint64 address = 1;
    uint32 length = 2;
    bytes disk = 3 [(bytes_size) = 64]; // optional disk name, e.g. "sdcard"
}

message ReadResult {
    bytes data = 2 [(bytes_size) = 512];
}

message JumpRequest {
    uint64 address = 1;
}

service DebugService {
    option (uuid) = "6f3cb468-94eb-4a2c-8fbf-d13cffbbf070";

    rpc echo(EchoRequest) returns (EchoResponse) { option (method_id) = 1; }
    rpc sleep(SleepRequest) returns (Nothing) { option(method_id) = 2; }

    rpc memory_write(WriteRequest) returns (Nothing) { option(method_id) = 3; }
    rpc memory_read(ReadRequest) returns (ReadResult) { option(method_id) = 4; }
    
    rpc storage_write(WriteRequest) returns (Nothing) { option(method_id) = 5; }
    rpc storage_read(ReadRequest) returns (ReadResult) { option(method_id) = 6; }

    rpc reboot(Nothing) returns (Nothing) { option(method_id) = 7; }
    rpc jump(JumpRequest) returns (Nothing) { option(method_id) = 8; }
}
